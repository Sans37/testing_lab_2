[pytest]
testpaths = src/tests
pythonpath = .
asyncio_mode = auto

# Опции для CI - без рандомизации, с XML отчетами
addopts =
    -v
    --cov=src
    --cov-report=xml:coverage.xml
    --junitxml=junit-results.xml
    --strict-markers
    --tb=line
    -p no:random-order

markers =
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests