name: Test Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_nady_bakery
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install allure-pytest pytest-asyncio pytest-cov

    - name: Wait for PostgreSQL
      run: |
        echo "Waiting for PostgreSQL..."
        sleep 5
        pg_isready -h localhost -p 5432

    - name: Create test database
      run: |
        PGPASSWORD=test_pass psql -h localhost -U test_user -d postgres -c "CREATE DATABASE test_nady_bakery;"

    - name: Run unit tests
      run: |
        pytest src/tests/unit/ \
          -v \
          --junitxml=test-results/unit.xml \
          --cov=src \
          --cov-report=xml:coverage-unit.xml
      continue-on-error: false

    - name: Run integration tests
      run: |
        pytest src/tests/integration/ \
          -v \
          -m integration \
          --junitxml=test-results/integration.xml \
          --cov=src --cov-append \
          --cov-report=xml:coverage-integration.xml
      continue-on-error: false

    - name: Run E2E tests
      run: |
        pytest src/tests/e2e/ \
          -v \
          -m e2e \
          --junitxml=test-results/e2e.xml \
          --cov=src --cov-append \
          --cov-report=xml:coverage-e2e.xml
      continue-on-error: false

    - name: Generate coverage report
      if: always()
      run: |
        coverage xml
        coverage html -d coverage-report

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test-results/
          coverage-report/
          *.xml