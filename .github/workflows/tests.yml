name: Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск

env:
  TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5433/test_nady_bakery

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_nady_bakery
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-xdist allure-pytest

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          if PGPASSWORD=test_pass pg_isready -h localhost -p 5433 -U test_user; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 2
        done

    - name: Initialize test database
      run: python scripts/init_test_db.py

    - name: Unit Tests
      id: unit
      run: |
        python -m pytest src/tests/unit/ \
          -v \
          --junitxml=test-results/unit.xml \
          --cov=src \
          --cov-report=xml:coverage-unit.xml \
          --cov-report=html:coverage-unit \
          --alluredir=allure-results/unit
      continue-on-error: true

    - name: Cleanup after unit tests
      if: always()
      run: python scripts/cleanup_test_db.py --reset

    - name: Integration Tests
      id: integration
      if: steps.unit.outcome == 'success'
      run: |
        python -m pytest src/tests/integration/ \
          -v \
          -m integration \
          --junitxml=test-results/integration.xml \
          --cov=src \
          --cov-append \
          --cov-report=xml:coverage-integration.xml \
          --cov-report=html:coverage-integration \
          --alluredir=allure-results/integration
      continue-on-error: true

    - name: Cleanup after integration tests
      if: always()
      run: python scripts/cleanup_test_db.py --reset

    - name: E2E Tests
      id: e2e
      if: steps.integration.outcome == 'success'
      run: |
        python -m pytest src/tests/e2e/ \
          -v \
          -m e2e \
          --junitxml=test-results/e2e.xml \
          --cov=src \
          --cov-append \
          --cov-report=xml:coverage-e2e.xml \
          --cov-report=html:coverage-e2e \
          --alluredir=allure-results/e2e
      continue-on-error: true

    - name: Cleanup after e2e tests
      if: always()
      run: python scripts/cleanup_test_db.py

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test-results/
          coverage-*.xml
          coverage-*/
          allure-results/

    - name: Generate Allure Report
      if: always()
      uses: simple-elf/allure-report-action@master
      with:
        allure_results: allure-results
        allure_report: allure-report
        gh_pages: gh-pages
        allure_history: allure-history

    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        destination_dir: allure-history

    - name: Check test status
      if: always()
      run: |
        if [[ "${{ steps.unit.outcome }}" == "failure" ]] || \
           [[ "${{ steps.integration.outcome }}" == "failure" ]] || \
           [[ "${{ steps.e2e.outcome }}" == "failure" ]]; then
          echo "❌ Тесты завершились с ошибками"
          exit 1
        else
          echo "✅ Все тесты успешно пройдены"
        fi