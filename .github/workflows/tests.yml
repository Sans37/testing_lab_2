name: Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5433/test_nady_bakery
  DATABASE_URL: postgresql://test_user:test_pass@localhost:5433/test_nady_bakery
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_nady_bakery
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-xdist allure-pytest httpx

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          if PGPASSWORD=test_pass pg_isready -h localhost -p 5433 -U test_user; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 2
        done

    - name: Initialize test database
      run: python scripts/init_test_db.py

    - name: Unit Tests
      id: unit
      run: |
        python -m pytest src/tests/unit/ \
          -v \
          --junitxml=test-results/unit.xml \
          --cov=src \
          --cov-report=xml:coverage-unit.xml \
          --cov-report=html:coverage-unit \
          --alluredir=allure-results
      continue-on-error: true

    - name: Cleanup after unit tests
      if: always()
      run: python scripts/cleanup_test_db.py --reset

    - name: Integration Tests
      id: integration
      if: always()
      run: |
        UNIT_STATUS="${{ steps.unit.outcome }}"
        if [[ -z "$UNIT_STATUS" ]] || [[ "$UNIT_STATUS" == "skipped" ]] || [[ "$UNIT_STATUS" == "success" ]]; then
          python -m pytest src/tests/integration/ \
            -v \
            -m integration \
            --junitxml=test-results/integration.xml \
            --cov=src \
            --cov-append \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=html:coverage-integration \
            --alluredir=allure-results
        else
          echo "⏭️ Unit tests failed, skipping integration tests"
          mkdir -p test-results
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><testsuites><testsuite name=\"pytest\" skipped=\"1\"><testcase name=\"integration/skipped\"><skipped type=\"pytest.skip\" message=\"Unit tests failed\"/></testcase></testsuite></testsuites>" > test-results/integration.xml
        fi
      shell: bash {0}
      continue-on-error: true

    - name: Cleanup after integration tests
      if: always()
      run: python scripts/cleanup_test_db.py --reset

    - name: Start API server for E2E tests
      if: steps.unit.outcome != 'failure' && steps.integration.outcome != 'failure'
      run: |
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/health
      shell: bash {0}

    - name: E2E Tests
      id: e2e
      if: steps.unit.outcome != 'failure' && steps.integration.outcome != 'failure'
      run: |
        python -m pytest src/tests/e2e/ \
          -v \
          -m e2e \
          --junitxml=test-results/e2e.xml \
          --cov=src \
          --cov-append \
          --cov-report=xml:coverage-e2e.xml \
          --cov-report=html:coverage-e2e \
          --alluredir=allure-results
      continue-on-error: true

    - name: Cleanup after e2e tests
      if: always()
      run: python scripts/cleanup_test_db.py

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test-results/
          coverage-*.xml
          coverage-*/
          allure-results/

    - name: Get Allure history from gh-pages
      if: always() && github.ref == 'refs/heads/main'
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages
      continue-on-error: true

    - name: Copy Allure history for trends
      if: always() && github.ref == 'refs/heads/main'
      run: |
        if [ -d "gh-pages/history" ]; then
          echo "📂 Found allure history, copying for trends..."
          cp -r gh-pages/history allure-results/history
        else
          echo "📂 No allure history found, first run"
        fi
      continue-on-error: true

    - name: Generate Allure Report
      if: always()
      run: |
        npm install -g allure-commandline --silent
        if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
          echo "📊 Generating Allure report..."
          allure generate allure-results --clean -o allure-report
        else
          echo "📊 No allure results to generate"
          mkdir -p allure-report
          echo "<html><body><h2>No test results yet</h2></body></html>" > allure-report/index.html
        fi
      shell: bash {0}

    - name: Deploy Allure Report to GitHub Pages
      if: always() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./allure-report
        keep_files: false

    - name: Check test status
      if: always()
      shell: bash {0}
      run: |
        UNIT_STATUS="${{ steps.unit.outcome }}"
        INT_STATUS="${{ steps.integration.outcome }}"
        E2E_STATUS="${{ steps.e2e.outcome }}"
        
        echo "📊 Итоговая проверка статусов:"
        echo "  Unit: $UNIT_STATUS"
        echo "  Integration: $INT_STATUS"
        echo "  E2E: $E2E_STATUS"
        
        if [[ "$UNIT_STATUS" == "failure" ]] || \
           [[ "$INT_STATUS" == "failure" ]] || \
           [[ "$E2E_STATUS" == "failure" ]]; then
          echo "❌ Некоторые тесты завершились с ошибками"
          exit 1
        else
          echo "✅ Все тесты успешно пройдены"
          exit 0
        fi