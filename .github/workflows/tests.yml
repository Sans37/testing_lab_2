name: Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Ручной запуск

env:
  TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5433/test_nady_bakery
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Форсируем использование Node.js 24

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_nady_bakery
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-xdist allure-pytest httpx

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          if PGPASSWORD=test_pass pg_isready -h localhost -p 5433 -U test_user; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 2
        done

    - name: Initialize test database
      run: python scripts/init_test_db.py

    - name: Unit Tests
      id: unit
      run: |
        python -m pytest src/tests/unit/ \
          -v \
          --junitxml=test-results/unit.xml \
          --cov=src \
          --cov-report=xml:coverage-unit.xml \
          --cov-report=html:coverage-unit \
          --alluredir=allure-results/unit
      continue-on-error: true

    - name: Cleanup after unit tests
      if: always()
      run: python scripts/cleanup_test_db.py --reset

    - name: Integration Tests
      id: integration
      if: always()  # Запускаем всегда, но проверяем статус unit
      run: |
        if [[ "${{ steps.unit.outcome }}" == "success" ]]; then
          python -m pytest src/tests/integration/ \
            -v \
            -m integration \
            --junitxml=test-results/integration.xml \
            --cov=src \
            --cov-append \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=html:coverage-integration \
            --alluredir=allure-results/integration
        else
          echo "⏭️ Unit tests failed, skipping integration tests"
          mkdir -p test-results
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><testsuites><testsuite name=\"pytest\" skipped=\"1\"><testcase name=\"integration/skipped\"><skipped type=\"pytest.skip\" message=\"Unit tests failed\"/></testcase></testsuite></testsuites>" > test-results/integration.xml
          exit 0
        fi
      shell: bash {0}
      continue-on-error: true

    - name: Cleanup after integration tests
      if: always()
      run: python scripts/cleanup_test_db.py --reset

    - name: E2E Tests
      id: e2e
      if: always()  # Запускаем всегда, но проверяем статус integration
      run: |
        if [[ "${{ steps.integration.outcome }}" == "success" ]] && [[ "${{ steps.unit.outcome }}" == "success" ]]; then
          python -m pytest src/tests/e2e/ \
            -v \
            -m e2e \
            --junitxml=test-results/e2e.xml \
            --cov=src \
            --cov-append \
            --cov-report=xml:coverage-e2e.xml \
            --cov-report=html:coverage-e2e \
            --alluredir=allure-results/e2e
        else
          echo "⏭️ Integration or unit tests failed, skipping e2e tests"
          mkdir -p test-results
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><testsuites><testsuite name=\"pytest\" skipped=\"1\"><testcase name=\"e2e/skipped\"><skipped type=\"pytest.skip\" message=\"Previous tests failed\"/></testcase></testsuite></testsuites>" > test-results/e2e.xml
          exit 0
        fi
      shell: bash {0}
      continue-on-error: true

    - name: Cleanup after e2e tests
      if: always()
      run: python scripts/cleanup_test_db.py

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test-results/
          coverage-*.xml
          coverage-*/
          allure-results/

    - name: Debug outcomes
      if: always()
      run: |
        echo "📊 Статусы тестов:"
        echo "  Unit outcome: ${{ steps.unit.outcome }}"
        echo "  Integration outcome: ${{ steps.integration.outcome }}"
        echo "  E2E outcome: ${{ steps.e2e.outcome }}"
        echo "  Unit conclusion: ${{ steps.unit.conclusion }}"
        echo "  Integration conclusion: ${{ steps.integration.conclusion }}"
        echo "  E2E conclusion: ${{ steps.e2e.conclusion }}"
      shell: bash {0}

    - name: Generate Allure Report
      if: always()
      run: |
        if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
          echo "📊 Generating Allure report..."
          npx allure generate allure-results --clean -o allure-report || echo "⚠️ Allure generation failed but continuing"
        else
          echo "📊 No allure results to generate"
          mkdir -p allure-report
        fi
      shell: bash {0}

    - name: Deploy Allure Report to GitHub Pages
      if: always() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./allure-report
        destination_dir: allure-history
        keep_files: true

    - name: Check test status
      if: always()
      shell: bash {0}
      run: |
        # Собираем статусы
        UNIT_STATUS="${{ steps.unit.outcome }}"
        INT_STATUS="${{ steps.integration.outcome }}"
        E2E_STATUS="${{ steps.e2e.outcome }}"
        
        echo "📊 Итоговая проверка статусов:"
        echo "  Unit: $UNIT_STATUS"
        echo "  Integration: $INT_STATUS"
        echo "  E2E: $E2E_STATUS"
        
        # Проверяем реальные ошибки (не skipped)
        if [[ "$UNIT_STATUS" == "failure" ]] || \
           [[ "$INT_STATUS" == "failure" ]] || \
           [[ "$E2E_STATUS" == "failure" ]]; then
          echo "❌ Некоторые тесты завершились с ошибками"
          exit 1
        elif [[ "$UNIT_STATUS" == "skipped" ]] && \
             [[ "$INT_STATUS" == "skipped" ]] && \
             [[ "$E2E_STATUS" == "skipped" ]]; then
          echo "⚠️ Все тесты пропущены"
          exit 0
        else
          echo "✅ Все выполненные тесты успешно пройдены"
          exit 0
        fi