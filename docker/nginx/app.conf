upstream api_backend {
    # Балансировка 2:1:1 для GET запросов
    server api-master:8000 weight=2 max_fails=3 fail_timeout=30s;
    server api-replica-1:8000 weight=1 max_fails=3 fail_timeout=30s;
    server api-replica-2:8000 weight=1 max_fails=3 fail_timeout=30s;

    # Настройки балансировки
    least_conn;
    keepalive 32;
}

upstream api_write_backend {
    # Только master для записи
    server api-master:8000 max_fails=3 fail_timeout=30s;

    # Health check
    check interval=3000 rise=2 fall=3 timeout=1000;
}

upstream mirror_backend {
    # Балансировка для mirror приложения
    server api-mirror-master:8000 weight=2 max_fails=3 fail_timeout=30s;
    server api-mirror-replica-1:8000 weight=1 max_fails=3 fail_timeout=30s;
    server api-mirror-replica-2:8000 weight=1 max_fails=3 fail_timeout=30s;

    least_conn;
    keepalive 32;
}

upstream mirror_write_backend {
    # Только mirror master для записи
    server api-mirror-master:8000 max_fails=3 fail_timeout=30s;

    check interval=3000 rise=2 fall=3 timeout=1000;
}

server {
    listen 80;
    server_name localhost nady-bakery.local;

    # Скрыть версию nginx и установить свой заголовок
    server_tokens off;
    more_set_headers 'Server: NadyBakeryApp/2.0';

    # Базовые заголовки безопасности
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========== GZIP СЖАТИЕ ==========
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xhtml+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ========== КЕШИРОВАНИЕ ==========
    # Кеш зона
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g
                     inactive=60m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m
                     max_size=2g inactive=365d use_temp_path=off;

    # Статические файлы - длительное кеширование
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header X-Cache-Status $upstream_cache_status always;
        root /usr/share/nginx/html;
        try_files $uri =404;

        # Включаем кеширование в nginx
        proxy_cache static_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
    }

    # HTML файлы - кеширование на час
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Cache-Status $upstream_cache_status always;
        root /usr/share/nginx/html;
        try_files $uri =404;

        proxy_cache static_cache;
        proxy_cache_valid 200 1h;
    }

    # ========== ОСНОВНЫЕ ENDPOINTS ==========

    # 1. Статический фронтенд (кеширование для GET запросов)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri.html $uri/ /index.html;

        # Кеширование для GET запросов
        if ($request_method = GET) {
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
            add_header X-Cache-Status "Static" always;
        }

        # Отключаем кеширование для не-GET запросов
        if ($request_method != GET) {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            expires 0;
        }
    }

    # 2. Health check (без кеширования)
    location /health {
        proxy_pass http://api_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Backend-Server $upstream_addr always;
        add_header X-Upstream-Name api_backend always;
        add_header X-Request-Time $request_time always;

        # Отключаем кеширование для health check
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }

    # 3. Instance info (для теста балансировки) с кешированием
    location /instance-info {
        proxy_pass http://api_backend/instance-info;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Backend-Server $upstream_addr always;
        add_header X-Upstream-Name api_backend always;
        add_header X-Cache-Status $upstream_cache_status always;

        # Включаем кеширование на 30 секунд
        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Enabled true always;
    }

    # 4. Test write (только на master) - без кеширования
    location /api/v2/test-write {
        proxy_pass http://api_write_backend/api/v2/test-write;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Backend-Server $upstream_addr always;
        add_header X-Upstream-Name api_write_backend always;

        # Отключаем кеширование для write операций
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }

    # 5. Все остальные API endpoints v1 (кеширование GET)
    location /api/v1/ {
        set $target_backend api_backend;

        # Если это метод записи - используем только master
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            set $target_backend api_write_backend;
        }

        proxy_pass http://$target_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        add_header X-Backend-Server $upstream_addr always;
        add_header X-Upstream-Name $target_backend always;
        add_header X-Request-Method $request_method always;
        add_header X-Cache-Status $upstream_cache_status always;

        # Кеширование только для GET запросов
        if ($request_method = GET) {
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 30s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            add_header X-Cache-Enabled true always;
        }

        # Отключаем кеширование для не-GET запросов
        if ($request_method != GET) {
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires 0;
        }
    }

    # 6. Все остальные API endpoints v2 (кеширование GET)
    location /api/v2/ {
        set $target_backend api_backend;

        # Если это метод записи - используем только master
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            set $target_backend api_write_backend;
        }

        proxy_pass http://$target_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;

        add_header X-Backend-Server $upstream_addr always;
        add_header X-Upstream-Name $target_backend always;
        add_header X-Request-Method $request_method always;
        add_header X-Cache-Status $upstream_cache_status always;

        # Кеширование только для GET запросов
        if ($request_method = GET) {
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 30s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            add_header X-Cache-Enabled true always;
        }

        # Отключаем кеширование для не-GET запросов
        if ($request_method != GET) {
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires 0;
        }
    }

    # 7. Зеркальное приложение /mirror
    location /mirror/ {
        # Перенаправляем на mirror бэкенд с сохранением пути
        rewrite ^/mirror(/.*)$ $1 break;

        set $target_backend mirror_backend;

        # Если это метод записи - используем только mirror master
        if ($request_method ~ ^(POST|PUT|PATCH|DELETE)$) {
            set $target_backend mirror_write_backend;
        }

        proxy_pass http://$target_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /mirror;
        proxy_set_header X-Original-URI $request_uri;

        # Для корректной работы относительных URL в приложении
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'href="/' 'href="/mirror/';
        sub_filter 'src="/' 'src="/mirror/';
        sub_filter 'action="/' 'action="/mirror/';
        sub_filter '"/api/' '"/mirror/api/';

        add_header X-Mirror-App true always;
        add_header X-Backend-Server $upstream_addr always;
        add_header X-Upstream-Name $target_backend always;
        add_header X-Cache-Status $upstream_cache_status always;

        # Кеширование для GET запросов
        if ($request_method = GET) {
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 60s;
            proxy_cache_valid 404 30s;
            add_header X-Cache-Enabled true always;
        }
    }

    # 8. Документация (только с master) с кешированием
    location /docs {
        proxy_pass http://api-master:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location /redoc {
        proxy_pass http://api-master:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location /openapi.json {
        proxy_pass http://api-master:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # 9. Мониторинг - Grafana (без кеширования)
    location /monitoring {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket поддержка для Grafana Live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header X-Monitoring-UI Grafana always;

        # Отключаем кеширование
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires 0;
    }

    # 10. Loki API для Grafana
    location /loki/ {
        proxy_pass http://loki:3100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Отключаем кеширование
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # 11. Adminer
    location /admin {
        proxy_pass http://adminer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключаем кеширование
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ========== СТАТУС NGINX ==========
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.20.0.0/16;
        deny all;
    }

    # Статус upstream серверов
    location /upstream_status {
        check_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.20.0.0/16;
        deny all;
    }

    # ========== ОБРАБОТКА ОШИБОК ==========
    # 403 - Forbidden (read-only violation)
    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
        add_header X-Error-Type Read-Only-Violation always;
    }

    # 404 - Not Found
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
        add_header X-Error-Page true always;
    }

    # 50x errors
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
        add_header X-Error-Page true always;
        add_header Retry-After 30 always;
    }

    # Обработка ошибок балансировки
    proxy_intercept_errors on;
    recursive_error_pages on;

    # Логирование
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;
}