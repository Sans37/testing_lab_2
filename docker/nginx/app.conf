server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 1. Главная страница (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 2. Резервный путь
    location /reserved/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 3. API v2 маршрутизация (FastAPI)
    location /api/v2/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Увеличиваем таймауты для API
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Для CORS (если нужно)
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type";

        # Для Swagger UI
        location /api/v2/docs {
            proxy_pass http://api:8000/docs;
        }

        location /api/v2/openapi.json {
            proxy_pass http://api:8000/openapi.json;
        }

        location /api/v2/redoc {
            proxy_pass http://api:8000/redoc;
        }
    }

    # 4. Legacy страница
    location /legacy {
        alias /usr/share/nginx/html/legacy.html;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # 5. Документация (Readme.md)
    location /documentation {
        alias /usr/share/nginx/html/readme.md;
        add_header Content-Type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";

        # Если хочешь рендерить markdown как HTML, можно добавить:
        # types {
        #     text/markdown md;
        # }
        # default_type text/markdown;
    }

    # 6. Админка БД (Adminer)
    location /admin {
        proxy_pass http://adminer:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Фикс для перенаправлений Adminer
        proxy_redirect http://adminer:8080/ /admin/;
        proxy_redirect / /admin/;

        # Куки
        proxy_cookie_path / /admin/;

        # Увеличиваем таймауты для админки
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 7. Статус Nginx
    location /status {
        stub_status on;
        access_log off;
        allow all;
        deny none;
    }

    # 8. Management панель
    location /managment {
        alias /usr/share/nginx/html/management.html;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-cache";
    }

    # 9. Статические файлы
    location /static/ {
        alias /usr/share/nginx/html/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Разрешаем CORS для статики
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
    }

    # 10. Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "Nginx is healthy\n";
    }

    # 11. Обработка ошибок
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Content-Type "text/html; charset=utf-8";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # 12. Оптимизация для статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}