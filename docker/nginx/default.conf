upstream api_backend {
    server api-master:8000 weight=2;
    server api-replica-1:8001 weight=1;
    server api-replica-2:8002 weight=1;
}

upstream api_write_backend {
    server api-master:8000;
}

upstream mirror_backend {
    server api-mirror:8003;
}

server {
    listen 80;
    server_name localhost;

    # Подменяем имя сервера
    add_header Server "NadyBakery/2.0";

    # Health check
    location /health {
        proxy_pass http://api_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Instance info для проверки балансировки
    location /instance-info {
        proxy_pass http://api_backend/instance-info;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Кеширование на 5 секунд
        proxy_cache api_cache;
        proxy_cache_valid 200 5s;
    }

    # API v2 с балансировкой
    location /api/v2/ {
        set $target_backend api_backend;

        # Для записи - только master
        if ($request_method = POST) {
            set $target_backend api_write_backend;
        }
        if ($request_method = PUT) {
            set $target_backend api_write_backend;
        }
        if ($request_method = PATCH) {
            set $target_backend api_write_backend;
        }
        if ($request_method = DELETE) {
            set $target_backend api_write_backend;
        }

        proxy_pass http://$target_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Кеширование GET запросов
        proxy_cache api_cache;
        proxy_cache_valid 200 60m;
        proxy_cache_methods GET HEAD;
    }

    # Mirror приложение
    location /mirror/ {
        rewrite ^/mirror(/.*)$ $1 break;
        proxy_pass http://mirror_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /mirror;
    }

    # Мониторинг Grafana
    location /monitoring/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket для Grafana Live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Adminer
    location /admin {
        proxy_pass http://adminer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Корень - балансировка
    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}