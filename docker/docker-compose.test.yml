#version: '3.8'

services:
  test-db:
    image: postgres:15-alpine
    container_name: nady-test-db
    environment:
      POSTGRES_DB: test_nady_bakery
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5432:5432"  # ИЗМЕНЕНО: было 5433:5432, теперь 5432:5432
    volumes:
      - ./init-test.sql:/docker-entrypoint-initdb.d/init.sql
      - test-postgres-data:/var/lib/postgresql/data
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_nady_bakery"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    container_name: nady-test-runner
    environment:
      TEST_DATABASE_URL: "postgresql://test_user:test_pass@test-db:5432/test_nady_bakery"
      DB_HOST: test-db
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_pass
      DB_NAME: test_nady_bakery
      PYTHONPATH: /appc
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ../test-results:/app/test-results
      - ../coverage-report:/app/coverage-report
      - ../allure-results:/app/allure-results
      - ../src:/app/src
      - ../scripts:/app/scripts
    networks:
      - test-network
    command: >
      sh -c "
        echo '🚀 Запуск тестов...' &&
        echo '1. 🧪 Unit тесты' &&
        python -m pytest src/tests/unit/ -v --junitxml=test-results/unit.xml &&
        echo '2. 🔗 Integration тесты' &&
        python scripts/cleanup_test_db.py --reset &&
        python -m pytest src/tests/integration/ -v -m integration --junitxml=test-results/integration.xml &&
        echo '3. 🎯 E2E тесты' &&
        python scripts/cleanup_test_db.py --reset &&
        python -m pytest src/tests/e2e/ -v -m e2e --junitxml=test-results/e2e.xml &&
        python scripts/cleanup_test_db.py &&
        echo '✅ Все тесты завершены'
      "

networks:
  test-network:
    driver: bridge

volumes:
  test-postgres-data: