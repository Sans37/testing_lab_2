#version: '3.8'

services:
  mock-external:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: nady-mock-external
    environment:
      APP_ENV: test
    ports:
      - "8081:8081"
    networks:
      - test-network
    command: uvicorn src.mock_external_service:app --host 0.0.0.0 --port 8081

  test-db:
    image: postgres:15-alpine
    container_name: nady-test-db
    environment:
      POSTGRES_DB: test_nady_bakery
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5432:5432"
    volumes:
      - ./init-test.sql:/docker-entrypoint-initdb.d/init.sql
      - test-postgres-data:/var/lib/postgresql/data
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_nady_bakery"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  test-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: nady-test-api
    environment:
      DATABASE_URL: postgresql://test_user:test_pass@test-db:5432/test_nady_bakery
      APP_ENV: test
      APP_INSTANCE: test-api
      DB_ROLE: master
      READ_ONLY: "false"
      JWT_SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      EXTERNAL_SERVICE_MODE: mock
      EXTERNAL_POSTS_BASE_URL: "http://mock-external:8081"
    ports:
      - "8000:8000"
    depends_on:
      test-db:
        condition: service_healthy
      mock-external:
        condition: service_started
    networks:
      - test-network
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    container_name: nady-test-runner
    environment:
      TEST_DATABASE_URL: "postgresql://test_user:test_pass@test-db:5432/test_nady_bakery"
      EXTERNAL_SERVICE_MODE: mock
      EXTERNAL_POSTS_BASE_URL: "http://mock-external:8081"
      APP_ENV: test
      API_URL: "http://test-api:8000"
      DB_HOST: test-db
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_pass
      DB_NAME: test_nady_bakery
      PYTHONPATH: /app
    depends_on:
      test-api:
        condition: service_started
      mock-external:
        condition: service_started
    volumes:
      - ../test-results:/app/test-results
      - ../coverage-report:/app/coverage-report
      - ../allure-results:/app/allure-results
      - ../src:/app/src
      - ../scripts:/app/scripts
    networks:
      - test-network
    command: >
      sh -c "
        echo 'Running tests...' &&
        echo '1. Unit tests' &&
        python -m pytest src/tests/unit/ -v --junitxml=test-results/unit.xml &&
        echo '2. Integration tests' &&
        python scripts/cleanup_test_db.py --reset &&
        python -m pytest src/tests/integration/ -v -m integration --junitxml=test-results/integration.xml &&
        echo '3. E2E tests' &&
        python scripts/cleanup_test_db.py --reset &&
        sleep 5 &&
        python -m pytest src/tests/e2e/ -v -m e2e --junitxml=test-results/e2e.xml &&
        python scripts/cleanup_test_db.py &&
        echo 'All tests finished'
      "

networks:
  test-network:
    driver: bridge

volumes:
  test-postgres-data:
